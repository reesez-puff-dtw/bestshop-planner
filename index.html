<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LG Best Shop · 업무 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070e;--sf:#0f0f1c;--bd:#ffffff0d;--tx:#e4e4f0;--gold:#c8a84b;--gold2:#e8c96b;--blue:#3d9be9;--purple:#7c6fcd;--green:#3ecf8e;--red:#f16464;--orange:#f59e0b;--cyan:#00c2d4;--pink:#e96d9b}
*::-webkit-scrollbar{width:4px;height:4px}*::-webkit-scrollbar-thumb{background:#ffffff12;border-radius:99px}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans','Noto Sans KR',sans-serif;min-height:100vh;font-size:14px}
.header{background:linear-gradient(180deg,#0f0f1c,#07070e);border-bottom:1px solid var(--bd);padding:18px 24px 0;position:sticky;top:0;z-index:50}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.logo-sub{font-size:9px;letter-spacing:4px;color:var(--gold);font-weight:700;margin-bottom:3px}
.logo-main{font-size:19px;font-weight:700;letter-spacing:-.5px}
.hr{text-align:right;font-size:11px;color:#444460;line-height:1.8}.hr strong{color:var(--gold)}
.nav{display:flex;gap:1px;overflow-x:auto}
.nb{background:transparent;border:none;border-bottom:2px solid transparent;color:#444460;padding:8px 11px;font-size:11px;font-weight:400;cursor:pointer;font-family:inherit;transition:all .2s;border-radius:6px 6px 0 0;white-space:nowrap;flex-shrink:0}
.nb.on{background:#c8a84b10;border-bottom-color:var(--gold);color:var(--gold);font-weight:700}
.ct{padding:20px 24px;max-width:760px;margin:0 auto}
/* owner tabs */
.otabs{display:flex;gap:6px;margin-bottom:18px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:6px}
.otab{flex:1;padding:9px 12px;border-radius:8px;border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.me-on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07070e;box-shadow:0 3px 12px #c8a84b30}
.me-off{background:#ffffff08;color:#555570;box-shadow:none}
.ji-off{background:#ffffff08;color:#555570}
.ji-on{background:#e96d9b18;color:var(--pink);border:1px solid #e96d9b30}
/* card */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:12px}
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
/* task card */
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:13px 16px;margin-bottom:8px;transition:all .2s;animation:fu .2s ease;position:relative}
.tc:hover{border-color:#ffffff16;transform:translateY(-1px)}
.tc.done{opacity:.4}.tc.jiha{border-left:3px solid var(--pink)!important;background:#e96d9b05}
.tc.trans{border:1px solid var(--red)!important;background:#f164640a}
.tc-in{display:flex;gap:12px;align-items:flex-start}
.tc-l{flex:1;min-width:0}
.tc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.tagr{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500}
.tc-title{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:4px}
.tc.done .tc-title{text-decoration:line-through;color:#3a3a55}
.tc-meta{font-size:11px;color:#444460;display:flex;gap:10px;flex-wrap:wrap}
.tbadge{position:absolute;top:10px;right:10px;font-size:9px;background:#f1646420;color:var(--red);padding:2px 8px;border-radius:99px;font-weight:700}
/* side panel */
.sp{background:var(--sf);border:1px solid #e96d9b20;border-radius:12px;padding:14px 16px;margin-bottom:14px}
.sp-item{padding:8px 10px;background:#e96d9b08;border:1px solid #e96d9b15;border-radius:8px;margin-bottom:6px;font-size:12px;cursor:pointer;transition:all .15s}
.sp-item:hover{background:#e96d9b14}
/* boxes */
.hintbox{font-size:11px;color:var(--gold);background:#c8a84b0e;border:1px solid #c8a84b1e;border-radius:8px;padding:9px 12px;margin-bottom:13px;line-height:1.6}
.infobox{font-size:11px;color:var(--blue);background:#3d9be90e;border:1px solid #3d9be91e;border-radius:8px;padding:9px 12px;margin-bottom:13px;line-height:1.6}
.warnbox{font-size:11px;color:var(--orange);background:#f59e0b0e;border:1px solid #f59e0b1e;border-radius:8px;padding:9px 12px;margin-bottom:13px;line-height:1.6}
.dangerbox{font-size:11px;color:var(--red);background:#f164640e;border:1px solid #f164641e;border-radius:8px;padding:9px 12px;margin-bottom:13px;line-height:1.6}
.pinkbox{font-size:11px;color:var(--pink);background:#e96d9b0e;border:1px solid #e96d9b1e;border-radius:8px;padding:9px 12px;margin-bottom:13px;line-height:1.6}
.greenbox{font-size:11px;color:var(--green);background:#3ecf8e0e;border:1px solid #3ecf8e1e;border-radius:8px;padding:9px 12px;margin-bottom:13px;line-height:1.6}
/* form */
.fl{font-size:10px;font-weight:700;color:#555570;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;display:block}
.fi{width:100%;background:var(--bg);border:1px solid #ffffff10;border-radius:9px;color:var(--tx);padding:10px 12px;font-size:13px;margin-bottom:13px;outline:none;font-family:inherit;transition:border .2s}
.fi:focus{border-color:var(--gold)}textarea.fi{resize:vertical}
.fi option{background:var(--sf)}
.tbtns{display:flex;gap:8px;margin-bottom:13px}
.tbtn{flex:1;padding:9px;border-radius:9px;border:1px solid #ffffff10;background:#ffffff04;color:#555570;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-row{display:flex;gap:10px;margin-top:6px}
.btn{border-radius:11px;padding:11px 16px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;border:1px solid #ffffff10;background:#ffffff06;color:#666688}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#07070e;font-weight:700;box-shadow:0 4px 20px #c8a84b30}
.btn.gold:hover{transform:translateY(-1px)}
.btn.blue{background:#3d9be918;border-color:#3d9be930;color:var(--blue);font-weight:600}
/* deploy */
.cl-item{padding:8px 0;border-bottom:1px solid #ffffff06;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.cl-item:last-child{border-bottom:none}
/* stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat-box{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.stat-box h5{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#444460;margin-bottom:6px}
.stat-box .sv{font-size:22px;font-weight:700;color:var(--gold)}
/* learn table */
.ltable{width:100%;border-collapse:collapse;font-size:12px}
.ltable th{text-align:left;padding:7px 10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#444460;border-bottom:1px solid var(--bd)}
.ltable td{padding:8px 10px;border-bottom:1px solid #ffffff05}
/* design */
.step-bar{display:flex;background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:22px}
.step-btn{flex:1;padding:10px 8px;text-align:center;font-size:11px;cursor:pointer;transition:all .2s;border-right:1px solid var(--bd)}
.step-btn:last-child{border-right:none}
.step-btn.on{background:#7c6fcd18;color:#7c6fcd;font-weight:700}
.step-btn:not(.on){color:#444460}
/* datepicker */
.dp-wrap{position:relative;display:inline-block;width:100%}
.dp-btn{width:100%;background:var(--bg);border:1px solid #ffffff10;border-radius:9px;color:var(--tx);padding:10px 12px;font-size:13px;margin-bottom:13px;outline:none;font-family:inherit;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;transition:border .2s}
.dp-btn:hover,.dp-btn:focus{border-color:var(--gold)}
.dp-btn.sm{padding:6px 10px;font-size:11px;margin-bottom:0;border-radius:7px;border-color:#ffffff15}
.dp-btn.sm:hover{border-color:var(--gold)}
.dp-pop{position:fixed;z-index:999;background:#141428;border:1px solid #ffffff18;border-radius:14px;padding:16px;box-shadow:0 20px 60px #00000080;width:260px;animation:fu .15s ease}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dp-nav{background:transparent;border:none;color:#888;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1}
.dp-nav:hover{background:#ffffff10;color:var(--tx)}
.dp-title{font-size:13px;font-weight:700;color:var(--tx)}
.dp-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dp-dow span{text-align:center;font-size:9px;font-weight:700;color:#444460;padding:4px 0;letter-spacing:.5px}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-cell{text-align:center;padding:6px 2px;font-size:12px;border-radius:6px;cursor:pointer;border:none;background:transparent;color:#888;font-family:inherit;transition:all .15s;line-height:1}
.dp-cell:hover:not(:disabled){background:#ffffff10;color:var(--tx)}
.dp-cell.today{color:var(--gold);font-weight:700}
.dp-cell.sel{background:var(--gold);color:#07070e;font-weight:700}
.dp-cell.other{color:#2a2a40}
.dp-cell:disabled{color:#1e1e30;cursor:default}
.dp-cell.in-range{background:#c8a84b18}
.dp-clear{width:100%;margin-top:10px;padding:7px;background:transparent;border:1px solid #ffffff10;border-radius:8px;color:#555570;font-size:11px;cursor:pointer;font-family:inherit}
.dp-clear:hover{border-color:#ffffff20;color:#888}

/* empty */
.empty{text-align:center;padding:50px 0}
/* week */
.wrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div><div class="logo-sub">LG BEST SHOP</div><div class="logo-main">업무 플래너</div></div>
    <div class="hr"><div id="hDate"></div><strong id="hMeta"></strong></div>
  </div>
  <div class="nav" id="nav"></div>
</div>
<div class="ct" id="app"></div>

<script>
// ═══════════════════════════ CONSTANTS ═══════════════════════════
const SK='lg-v7';
const ME='정희라', TEAM='이지아', TL='이지아 책임님';
const TYPES=['Task','Sub-task'];
const TC={Task:'#3d9be9','Sub-task':'#7c6fcd'};
const STS=['To Do','In Progress','Done'];
const SC={'To Do':'#666688','In Progress':'#f59e0b','Done':'#3ecf8e'};
const DK=['일','월','화','수','목','금','토'];
const RC={기획:'#c8a84b',디자인:'#e96d9b',퍼블:'#00c2d4',개발:'#3d9be9'};
const ROLES=['기획','디자인','퍼블','개발'];
const MEMBERS={기획:[ME,TEAM],디자인:['김소진','양소라','신혜연'],퍼블:['박혜미','김영서','이은진'],개발:['이효근','김알찬']};
const ALL=Object.values(MEMBERS).flat();
const WT=['신규 디자인','디자인 수정','UI 수정','퍼블 수정','개발 수정','CMS 등록','기타'];
const WC={'신규 디자인':'#7c6fcd','디자인 수정':'#e96d9b','UI 수정':'#3d9be9','퍼블 수정':'#00c2d4','개발 수정':'#f59e0b','CMS 등록':'#3ecf8e','기타':'#666688'};
const MTH=['One-Drive 업데이트','홈플러스 휴무일 등록','백화점 휴무일 등록'];
const VIEWS=['today','week','deploy','board','add','design','impact','learn'];
const VLABEL=['📋 오늘','🗓 이번주','🚀 배포','🗂 전체','＋ 등록','🎨 디자인','🔍 영향도','📊 학습'];

// ═══════════════════════════ STATE ═══════════════════════════
let S={tasks:[],impactHistory:[],designHistory:[],lastBrief:null};
let V='today', EID=null, FD={}, OWN=ME;
let DS=1, DB={campaignName:'',target:'',outputType:'banner',keywords:[],moods:[],colors:[],tones:[],refs:[],request:'',deadline:'',assignees:[]};
let DC={}, DPC={}, II='', IR=[];

// ═══════════════════════════ STORAGE ═══════════════════════════
function load(){try{const r=localStorage.getItem(SK);if(r)S=JSON.parse(r);}catch{}
  if(!S.impactHistory)S.impactHistory=[];
  if(!S.designHistory)S.designHistory=[];
}
function save(){localStorage.setItem(SK,JSON.stringify(S));}

// ═══════════════════════════ UTILS ═══════════════════════════
const td=()=>new Date().toISOString().split('T')[0];
const fmt=s=>{if(!s)return'-';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}(${DK[d.getDay()]})`};
const dueIn=s=>{if(!s)return null;return Math.ceil((new Date(s+'T00:00:00')-new Date(td()+'T00:00:00'))/864e5)};
const diffD=(a,b)=>Math.max(1,Math.ceil((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/864e5));
const addD=(s,n)=>{const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const wk=()=>{const t=new Date(),m=new Date(t);m.setDate(t.getDate()-((t.getDay()+6)%7));return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d.toISOString().split('T')[0]})};
const mRole=m=>Object.entries(MEMBERS).find(([,ms])=>ms.includes(m))?.[0]||null;

// 다음 배포일 (화/목)
function nextDeploy(){
  const t=new Date();
  for(let i=1;i<=7;i++){const d=new Date(t);d.setDate(t.getDate()+i);const w=d.getDay();if(w===2||w===4)return d.toISOString().split('T')[0];}
}
// 배포 전날 = TC일
function tcDay(dep){const d=new Date(dep+'T00:00:00');d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];}
// 말일 워크데이
function lastWD(y,mo){let d=new Date(y,mo,0);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];}

// ═══════════════════════════ DATEPICKER ═══════════════════════════
let DP={open:false,target:null,y:0,m:0,cb:null,val:null,pos:{top:0,left:0}};

function dpOpen(target, currentVal, cb, opts={}) {
  const rect = target.getBoundingClientRect();
  const d = currentVal ? new Date(currentVal+'T00:00:00') : new Date();
  DP = {open:true, target, y:d.getFullYear(), m:d.getMonth(), cb, val:currentVal||null, opts,
    pos:{top: rect.bottom+6, left: Math.min(rect.left, window.innerWidth-270)}};
  renderDP();
}

function renderDP() {
  let el = document.getElementById('dp-root');
  if (!DP.open) { if(el) el.remove(); return; }
  if (!el) { el=document.createElement('div'); el.id='dp-root'; document.body.appendChild(el); }

  const now = td();
  const firstDay = new Date(DP.y, DP.m, 1).getDay();
  const daysInMonth = new Date(DP.y, DP.m+1, 0).getDate();
  const daysInPrev = new Date(DP.y, DP.m, 0).getDate();
  const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let cells = '';
  // prev month
  for(let i=firstDay-1;i>=0;i--) {
    cells+=`<button class="dp-cell other" disabled>${daysInPrev-i}</button>`;
  }
  // current month
  for(let d=1;d<=daysInMonth;d++) {
    const ds=`${DP.y}-${String(DP.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===now, isSel=ds===DP.val;
    cells+=`<button class="dp-cell${isToday?' today':''}${isSel?' sel':''}" onclick="dpSelect('${ds}')">${d}</button>`;
  }
  // next month
  const rem=(7-((firstDay+daysInMonth)%7))%7;
  for(let d=1;d<=rem;d++) cells+=`<button class="dp-cell other" disabled>${d}</button>`;

  el.innerHTML=`<div class="dp-pop" id="dp-pop" style="top:${DP.pos.top}px;left:${DP.pos.left}px">
    <div class="dp-head">
      <button class="dp-nav" onclick="dpNav(-1)">‹</button>
      <span class="dp-title">${DP.y}년 ${MONTHS[DP.m]}</span>
      <button class="dp-nav" onclick="dpNav(1)">›</button>
    </div>
    <div class="dp-dow">${['일','월','화','수','목','금','토'].map(d=>`<span style="color:${d==='일'?'#f16464':d==='토'?'#3d9be9':'#444460'}">${d}</span>`).join('')}</div>
    <div class="dp-grid">${cells}</div>
    ${DP.val?`<button class="dp-clear" onclick="dpSelect(null)">선택 해제</button>`:''}
  </div>`;
}

function dpNav(dir) {
  DP.m+=dir;
  if(DP.m>11){DP.m=0;DP.y++;}
  if(DP.m<0){DP.m=11;DP.y--;}
  renderDP();
}

function dpSelect(val) {
  DP.val=val;
  if(DP.cb) DP.cb(val);
  DP.open=false;
  renderDP();
}

function dpClose(e) {
  if(!DP.open) return;
  const pop=document.getElementById('dp-pop');
  if(pop&&!pop.contains(e.target)&&e.target!==DP.target) {
    DP.open=false; renderDP();
  }
}
document.addEventListener('mousedown', dpClose);
document.addEventListener('scroll', ()=>{if(DP.open){DP.open=false;renderDP();}}, true);

// 편의 함수: datepicker 버튼 HTML 생성
function dpBtn(val, cb, opts={}) {
  const display = val ? fmt(val) : '날짜 선택';
  const id = 'dpb_'+(Math.random()*1e8|0);
  const sm = opts.sm ? 'sm' : '';
  // cb는 문자열 형태 JS 표현식 (onclick에 직접 삽입)
  return `<button id="${id}" class="dp-btn ${sm}" onclick="dpOpen(this,'${val||''}',${cb})">${display}<span style="color:#444460;font-size:10px">▾</span></button>`;
}

function compEst(){
  const g={};
  S.tasks.forEach(t=>{if(t.status==='Done'&&t.startDate&&t.endDate){const k=`${t.assignee}|${t.type}`;if(!g[k])g[k]=[];g[k].push(diffD(t.startDate,t.endDate));}});
  const r={};
  Object.entries(g).forEach(([k,arr])=>{
    const[a,type]=k.split('|');if(!r[a])r[a]={};
    const rec=arr.slice(-3),avg=arr.reduce((s,x)=>s+x,0)/arr.length,rAvg=rec.reduce((s,x)=>s+x,0)/rec.length;
    r[a][type]={avg:Math.round((avg*.4+rAvg*.6)*10)/10,count:arr.length,samples:arr.slice(-5)};
  });
  return r;
}
function getEst(a,type){
  const e=compEst();if(e[a]?.[type])return e[a][type].avg;
  const all=S.tasks.filter(t=>t.status==='Done'&&t.type===type&&t.startDate&&t.endDate);
  if(all.length)return Math.round(all.reduce((s,t)=>s+diffD(t.startDate,t.endDate),0)/all.length*10)/10;
  return type==='Task'?3:1;
}

// ═══════════════════════════ HELPERS ═══════════════════════════
const getTrans=()=>S.tasks.filter(t=>t.originalAssignee===TEAM&&t.assignee===ME);
const getJiha=()=>S.tasks.filter(t=>t.assignee===TEAM&&t.status!=='Done');

function ownerTabs(){
  const isMe=OWN===ME;
  return `<div class="otabs">
    <button class="otab ${isMe?'me-on':'me-off'}" onclick="OWN='${ME}';render()">👤 ${ME} (나)</button>
    <button class="otab ${!isMe?'ji-on':'ji-off'}" onclick="OWN='${TEAM}';render()">👤 ${TL}</button>
  </div>`;
}

function transferAlert(){
  const items=getTrans();if(!items.length)return'';
  return `<div style="background:#f1646408;border:1px solid #f164641e;border-radius:12px;padding:13px 16px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px">🔄 이관 알림 (${items.length}건) — ${TL} → ${ME}</div>
    ${items.map(t=>`<div style="background:var(--bg);border:1px solid #f164641e;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:12px">
      <div style="font-weight:500;margin-bottom:3px">${t.code?`<span style="color:var(--blue);font-size:10px;margin-right:4px">${esc(t.code)}</span>`:''}${esc(t.summary)}</div>
      <div style="font-size:11px;color:#555570;display:flex;gap:8px"><span style="color:var(--pink)">${TL}→${ME}</span><span>마감:${fmt(t.dueDate)}</span><span style="color:var(--orange)">이관:${fmt(t.transferDate)}</span></div>
    </div>`).join('')}
    <div style="font-size:10px;color:#555570;margin-top:6px">업무 수정 → '이관 확인' 처리 시 알림 제거</div>
  </div>`;
}

function monthlyReminder(){
  const now=new Date(),t=td();
  const lwd=lastWD(now.getFullYear(),now.getMonth()+1);
  const left=Math.ceil((new Date(lwd+'T00:00:00')-new Date(t+'T00:00:00'))/864e5);
  if(left<0||left>4)return'';
  return `<div class="greenbox">📅 <strong>이달 말일 정기 업무</strong> ${fmt(lwd)} ${left===0?'· 오늘!':'· '+left+'일 후'}<br>
    ${MTH.map(m=>`<span style="color:var(--green)">▸ ${m}</span>`).join('&nbsp;&nbsp;')}</div>`;
}

function jihaSide(){
  const items=getJiha();if(!items.length)return'';
  return `<div class="sp">
    <div style="font-size:11px;font-weight:700;color:var(--pink);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">👀 ${TL} 진행 중 (${items.length}건)</div>
    ${items.map(t=>`<div class="sp-item" onclick="editTask('${t.id}')">
      <div style="font-weight:500;margin-bottom:3px">${t.code?`<span style="color:var(--blue);font-size:10px;font-weight:700;margin-right:4px">${esc(t.code)}</span>`:''}${esc(t.summary)}</div>
      <div style="font-size:10px;color:#555570;display:flex;gap:8px">
        <span style="color:${TC[t.type]}">${t.type}</span>
        <span style="color:${SC[t.status]}">${t.status}</span>
        <span>마감:${fmt(t.dueDate)}</span>
        ${(dueIn(t.dueDate)||99)<=2?`<span style="color:var(--red)">D-${dueIn(t.dueDate)}</span>`:''}
      </div>
    </div>`).join('')}
  </div>`;
}

// ═══════════════════════════ TASK CARD ═══════════════════════════
function taskCard(t){
  const u=dueIn(t.dueDate);
  const uc=u===null?'#555':u<0?'#f16464':u===0?'#f59e0b':u<=2?'#f97316':'#444460';
  const dl=u===null?'마감미정':u<0?`${Math.abs(u)}일초과`:u===0?'오늘마감':`D-${u}`;
  const isJ=t.assignee===TEAM, isTr=t.originalAssignee===TEAM&&t.assignee===ME;
  const bc=isTr?'#f16464':isJ?'#e96d9b':(TC[t.type]||'#888');
  const workers=t.workers||[], scheds=t.teamSchedules||{};
  const hasDesign=MEMBERS['디자인'].some(m=>workers.includes(m));
  const schedTags=ROLES.filter(r=>scheds[r]?.start).map(r=>{
    const s=scheds[r], days=s.start&&s.end?diffD(s.start,s.end):null;
    return`<span class="tagr" style="background:${RC[r]}18;color:${RC[r]}">${r}${days?' '+days+'일':''}</span>`;
  }).join('');

  return `<div class="tc${t.status==='Done'?' done':''}${isJ?' jiha':''}${isTr?' trans':''}" style="border-left:3px solid ${t.status==='Done'?'#ffffff08':bc}">
  ${isTr?`<div class="tbadge">🔄 이관됨</div>`:''}
  <div class="tc-in">
    <div class="tc-l">
      <div class="tc-tags">
        ${t.code?`<span class="tag" style="background:#3d9be912;color:var(--blue)">${esc(t.code)}</span>`:''}
        <span class="tag" style="background:${TC[t.type]}18;color:${TC[t.type]}">${t.type}</span>
        ${t.workType?`<span class="tagr" style="background:${WC[t.workType]||'#888'}18;color:${WC[t.workType]||'#888'}">${t.workType}</span>`:''}
        <span class="tagr" style="background:${SC[t.status]}18;color:${SC[t.status]}">${t.status}</span>
        <span class="tagr" style="background:${uc}12;color:${uc}">${dl}</span>
        ${hasDesign?`<span class="tagr" style="background:#e96d9b18;color:#e96d9b">🎨 디자인</span>`:''}
        ${isJ?`<span class="tagr" style="background:#e96d9b18;color:#e96d9b">👤 ${TL}</span>`:''}
      </div>
      <div class="tc-title">${esc(t.summary)}</div>
      <div class="tc-meta">
        <span>👤 ${esc(t.assignee||'-')}${t.assignee===ME?' (나)':t.assignee===TEAM?' (책임님)':''}</span>
        ${t.startDate?`<span>시작:${fmt(t.startDate)}</span>`:''}
        ${t.dueDate?`<span>마감:${fmt(t.dueDate)}</span>`:''}
      </div>
      ${workers.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">${workers.map(w=>{const r=mRole(w);return`<span class="tagr" style="background:${RC[r]||'#888'}18;color:${RC[r]||'#888'}">${w}</span>`;}).join('')}</div>`:''}
      ${schedTags?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${schedTags}</div>`:''}
      ${t.memo?`<div style="font-size:11px;color:#3a3a55;margin-top:5px">${esc(t.memo)}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0">
      <div style="display:flex;gap:3px">
        <button style="background:transparent;border:none;cursor:pointer;font-size:13px;padding:3px 4px;opacity:.5;transition:opacity .15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5" onclick="editTask('${t.id}')">✏️</button>
        <button style="background:transparent;border:none;cursor:pointer;font-size:13px;padding:3px 4px;opacity:.5;transition:opacity .15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5" onclick="delTask('${t.id}')">🗑</button>
      </div>
      <select style="background:#ffffff06;border:1px solid #ffffff10;border-radius:6px;color:${SC[t.status]};font-size:10px;padding:3px 6px;cursor:pointer;font-family:inherit;outline:none" onchange="setSts('${t.id}',this.value)">
        ${STS.map(s=>`<option${s===t.status?' selected':''}>${s}</option>`).join('')}
      </select>
    </div>
  </div></div>`;
}


// ─── TODAY ───────────────────────────────────────────────────
function rToday(){
  const t=td(),nd=nextDeploy(),tc=tcDay(nd),isMe=OWN===ME;
  const active=S.tasks.filter(x=>x.assignee===OWN&&x.status!=='Done'&&x.startDate<=t&&(!x.dueDate||x.dueDate>=t)).sort((a,b)=>(dueIn(a.dueDate)||99)-(dueIn(b.dueDate)||99));
  const overdue=S.tasks.filter(x=>x.assignee===OWN&&x.status!=='Done'&&x.dueDate&&x.dueDate<t);
  const daysND=Math.ceil((new Date(nd+'T00:00:00')-new Date(t+'T00:00:00'))/864e5);
  let h=ownerTabs();
  if(isMe){
    h+=transferAlert(); h+=monthlyReminder();
    if(t===nd) h+=`<div class="dangerbox">🚀 오늘은 <strong>배포일</strong>입니다. 최종 확인 후 배포를 진행해주세요.</div>`;
    else if(t===tc) h+=`<div class="warnbox">🧪 오늘은 <strong>TC/테스트일</strong>입니다. 버그 체크 및 TC 작성을 완료해주세요.</div>`;
    else if(daysND<=2) h+=`<div class="dangerbox">🚀 <strong>${fmt(nd)} 배포</strong> ${daysND===1?'내일':'이틀 후'}! 배포 예정 업무 ${S.tasks.filter(x=>x.assignee===ME&&x.status!=='Done'&&x.dueDate===nd).length}건 확인 필요</div>`;
  }
  if(overdue.length){h+=`<div class="sl" style="color:var(--red)">⚠ 기한 초과 (${overdue.length})</div>`;h+=overdue.map(taskCard).join('');h+='<div style="height:16px"></div>';}
  if(active.length){h+=`<div class="sl" style="color:var(--gold)">오늘 처리할 업무 (${active.length})</div>`;h+=active.map(taskCard).join('');}
  else if(!overdue.length) h+=`<div class="empty"><div style="font-size:34px;margin-bottom:10px">🎯</div><div style="font-size:14px;color:#666688">오늘 처리할 업무가 없어요</div></div>`;
  if(isMe) h+=jihaSide();
  return h;
}

// ─── WEEK ─────────────────────────────────────────────────────
function rWeek(){
  const t=td(),nd=nextDeploy(),tc=tcDay(nd);
  let h=ownerTabs();
  h+=wk().map(day=>{
    const isT=day===t,isPast=day<td();
    const dayTasks=S.tasks.filter(x=>x.assignee===OWN&&x.status!=='Done'&&x.dueDate===day);
    const depBadge=day===nd?`<span class="tagr" style="background:#f1646420;color:#f16464">🚀 배포일</span>`:day===tc?`<span class="tagr" style="background:#f59e0b20;color:#f59e0b">🧪 TC</span>`:'';
    return `<div style="margin-bottom:22px">
      <div class="wrow">
        <span style="font-size:13px;font-weight:700;color:${isT?'var(--gold)':isPast?'#2a2a40':'var(--tx)'}">${fmt(day)}</span>
        ${isT?`<span class="tagr" style="background:#c8a84b15;color:var(--gold)">TODAY</span>`:''}
        ${depBadge}
        <div style="flex:1;height:1px;background:#ffffff06"></div>
        <span style="font-size:11px;color:#333350">${dayTasks.length}건</span>
      </div>
      ${dayTasks.length?dayTasks.map(taskCard).join(''):'<div style="font-size:11px;color:#1e1e30;text-align:center;padding:6px">—</div>'}
    </div>`;
  }).join('');
  if(OWN===ME) h+=jihaSide();
  return h;
}

// ─── DEPLOY ───────────────────────────────────────────────────
// 배포 : 다음 배포일 1회 + 전날 TC일 1회만 표시
function rDeploy(){
  const nd=nextDeploy(), tc=tcDay(nd), t=td();
  const ndTasks=S.tasks.filter(x=>x.assignee===ME&&x.status!=='Done'&&x.dueDate===nd);
  const CL=['기획서 최종 확인','TC 케이스 작성 완료','테스트 환경 검증','디자인 QA 완료','개발 코드 리뷰','스테이징 배포 확인','핫픽스 담당자 지정'];

  const tcCard=`<div style="background:#f59e0b0a;border:1px solid #f59e0b25;border-radius:14px;padding:18px 20px;margin-bottom:12px">
    <div class="sl" style="color:var(--orange);margin-bottom:4px">🧪 TC / 테스트일</div>
    <div style="font-size:20px;font-weight:700;color:var(--tx);margin-bottom:10px">${fmt(tc)}</div>
    <div style="font-size:12px;color:#888;line-height:1.8">배포 전날 기획자 직접 QA 및 TC 작성일이에요. 버그 발견 시 개발팀에 즉시 공유해주세요.</div>
    ${t===tc?`<div class="warnbox" style="margin-top:10px;margin-bottom:0">⚠ 오늘이 TC일입니다!</div>`:''}
  </div>`;

  const depCard=`<div style="background:#f164640a;border:1px solid #f1646425;border-radius:14px;padding:18px 20px;margin-bottom:12px">
    <div class="sl" style="color:var(--red);margin-bottom:4px">🚀 배포일</div>
    <div style="font-size:20px;font-weight:700;color:var(--tx);margin-bottom:12px">${fmt(nd)}</div>
    <ul style="padding:0;list-style:none">
      ${CL.map((item,i)=>`<div id="dcl-${i}" onclick="togDep(${i})" class="cl-item" style="color:${DPC[i]?'var(--green)':'#888'}">
        <span style="color:${DPC[i]?'var(--green)':'#333350'}">${DPC[i]?'●':'○'}</span>${item}
      </div>`).join('')}
    </ul>
    ${t===nd?`<div class="dangerbox" style="margin-top:10px;margin-bottom:0">🚀 오늘이 배포일입니다!</div>`:''}
  </div>`;

  const tasksHtml=ndTasks.length
    ?`<div class="sl" style="color:var(--gold);margin-bottom:8px">배포 예정 업무 (${ndTasks.length}건)</div>${ndTasks.map(taskCard).join('')}`
    :`<div style="font-size:12px;color:#333350;text-align:center;padding:20px">배포 예정 업무가 없어요</div>`;

  return tcCard+depCard+tasksHtml;
}
function togDep(i){DPC[i]=!DPC[i];const el=document.getElementById(`dcl-${i}`);if(el){el.style.color=DPC[i]?'var(--green)':'#888';el.querySelector('span').textContent=DPC[i]?'●':'○';el.querySelector('span').style.color=DPC[i]?'var(--green)':'#333350';}}

// ─── BOARD ────────────────────────────────────────────────────
function rBoard(){
  let h=ownerTabs();
  h+=STS.map(s=>{const g=S.tasks.filter(x=>x.assignee===OWN&&x.status===s);
    return`<div style="margin-bottom:26px"><div class="sl" style="color:${SC[s]}">${s} (${g.length})</div>${g.length?g.map(taskCard).join(''):'<div style="font-size:11px;color:#1e1e30;padding:6px">—</div>'}</div>`;
  }).join('');
  if(OWN===ME) h+=jihaSide();
  return h;
}

// ─── FORM ─────────────────────────────────────────────────────
function rForm(){
  const isEdit=!!EID, f=FD, isTr=f.originalAssignee===TEAM&&f.assignee===ME;
  const workers=f.workers||[], scheds=f.teamSchedules||{};
  const hasDesign=MEMBERS['디자인'].some(m=>workers.includes(m));
  const allS=ROLES.map(r=>scheds[r]?.start).filter(Boolean).sort();
  const allE=ROLES.map(r=>scheds[r]?.end).filter(Boolean).sort();
  const oStart=allS[0]||null, oEnd=allE.slice(-1)[0]||null;

  const teamBlocks=ROLES.map(role=>{
    const rc=RC[role], sc=scheds[role]||{};
    const rw=MEMBERS[role].filter(m=>workers.includes(m)), has=rw.length>0;
    const est=rw[0]?getEst(rw[0],f.type||'Task'):null;
    const estE=est&&sc.start?addD(sc.start,Math.round(est)):null;
    const days=sc.start&&sc.end?diffD(sc.start,sc.end):null;
    return `<div style="background:${has?rc+'08':'#ffffff02'};border:1px solid ${has?rc+'25':'#ffffff08'};border-radius:10px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${has?'10px':'0'}">
        <span style="font-size:10px;font-weight:700;color:${has?rc:'#333350'};letter-spacing:1px;min-width:32px">${role}팀</span>
        <div style="display:flex;gap:5px;flex-wrap:wrap;flex:1">
          ${MEMBERS[role].map(m=>{const sel=workers.includes(m);
            return`<button onclick="togW('${m}')" style="padding:4px 10px;border-radius:99px;border:1px solid ${sel?rc:'#ffffff10'};background:${sel?rc+'20':'transparent'};color:${sel?rc:'#444460'};font-size:11px;font-weight:${sel?700:400};cursor:pointer;font-family:inherit;transition:all .2s">${m}${sel?' ✓':''}</button>`;
          }).join('')}
        </div>
        ${days?`<span class="tagr" style="background:${rc}18;color:${rc};font-weight:700;flex-shrink:0">${days}일</span>`:''}
      </div>
      ${has?`<div style="display:flex;gap:8px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:5px;flex:1;min-width:130px">
          <span style="font-size:10px;color:#444460;white-space:nowrap">시작</span>
          ${dpBtn(sc.start||'', `function(v){setTS('${role}','start',v)}`, {sm:true})}
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex:1;min-width:130px">
          <span style="font-size:10px;color:#444460;white-space:nowrap">마감</span>
          ${dpBtn(sc.end||'', `function(v){setTS('${role}','end',v)}`, {sm:true})}
        </div>
        ${estE&&!sc.end?`<button onclick="setTS('${role}','end','${estE}')" style="background:${rc}18;border:1px solid ${rc}30;border-radius:7px;color:${rc};font-size:10px;padding:6px 10px;cursor:pointer;font-family:inherit;white-space:nowrap">📊 ${est}일 자동</button>`:''}
      </div>`:`<div style="font-size:10px;color:#333350;margin-top:2px">작업자 선택 후 일정을 입력할 수 있어요</div>`}
    </div>`;
  }).join('');

  return `<div class="card">
  <div style="font-size:15px;font-weight:700;margin-bottom:18px">${isEdit?'업무 수정':'새 업무 등록'}</div>
  ${isTr?`<div class="pinkbox">🔄 <strong>${TL}</strong>에서 <strong>${ME}</strong>로 이관된 항목이에요.</div>`:''}

  <label class="fl">업무 유형</label>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px">
    ${WT.map(w=>{const c=WC[w];return`<button onclick="FD.workType='${w}';render()" style="padding:6px 12px;border-radius:99px;border:1px solid ${(f.workType||'')=== w?c:'#ffffff12'};background:${(f.workType||'')=== w?c+'20':'#ffffff05'};color:${(f.workType||'')=== w?c:'#555570'};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">${w}</button>`;}).join('')}
  </div>

  <label class="fl">지라 코드</label>
  <input class="fi" id="fCode" placeholder="LGS-123" value="${esc(f.code||'')}">

  <label class="fl">유형</label>
  <div class="tbtns">
    ${TYPES.map(t=>`<button class="tbtn" onclick="setType('${t}')" style="${(f.type||'Task')===t?`border-color:${TC[t]};background:${TC[t]}18;color:${TC[t]}`:''}">${t}</button>`).join('')}
  </div>

  <label class="fl">Summary</label>
  <input class="fi" id="fSum" placeholder="업무 내용" value="${esc(f.summary||'')}">

  <label class="fl">Assignee <span style="color:#444460;font-weight:400;text-transform:none;font-size:10px">기획 담당 1명</span></label>
  <div style="display:flex;gap:8px;margin-bottom:13px">
    ${[ME,TEAM].map(m=>`<button onclick="FD.assignee='${m}';render()" style="flex:1;padding:10px;border-radius:9px;border:1px solid ${(f.assignee||ME)===m?'var(--gold)':'#ffffff10'};background:${(f.assignee||ME)===m?'#c8a84b18':'#ffffff04'};color:${(f.assignee||ME)===m?'var(--gold)':'#555570'};font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">${m}${m===ME?' (나)':' (책임님)'}</button>`).join('')}
  </div>

  <label class="fl">작업자 & 팀별 일정 <span style="color:#444460;font-weight:400;text-transform:none;font-size:10px">팀원 선택 → 일정 입력</span></label>
  ${teamBlocks}

  ${oStart||oEnd?`<div style="background:#ffffff05;border:1px solid var(--bd);border-radius:9px;padding:10px 14px;margin-bottom:13px;font-size:11px;display:flex;gap:14px;flex-wrap:wrap;align-items:center">
    <span style="color:#444460">전체 기간</span>
    <span style="color:var(--tx);font-weight:600">${fmt(oStart)} → ${fmt(oEnd)}</span>
    ${oStart&&oEnd?`<span style="color:var(--gold);font-weight:600">총 ${diffD(oStart,oEnd)}일</span>`:''}
    ${hasDesign?'<span class="tagr" style="background:#e96d9b18;color:#e96d9b">🎨 디자인 포함</span>':''}
  </div>`:''}

  <label class="fl">상태</label>
  <select class="fi" id="fSts">${STS.map(s=>`<option${(f.status||'To Do')===s?' selected':''}>${s}</option>`).join('')}</select>

  ${isEdit&&f.originalAssignee===TEAM?`<button onclick="confirmTrans('${EID}')" style="width:100%;border:1px solid #3ecf8e30;background:#3ecf8e0e;border-radius:9px;color:var(--green);padding:10px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;margin-bottom:13px">✅ 이관 확인 처리 (알림 제거)</button>`:''}

  <label class="fl">메모</label>
  <textarea class="fi" id="fMemo" rows="3">${esc(f.memo||'')}</textarea>

  <div class="btn-row">
    <button class="btn" onclick="cancelF()">취소</button>
    <button class="btn gold" onclick="submitF()">${isEdit?'수정완료':'등록'}</button>
  </div>
</div>`;
}

function getDRec(kws){const k=kws.join(' ').toLowerCase();for(const m of KMAP){if(m.kw.some(w=>k.includes(w)))return m;}return null;}
function gBriefText(b){
  const ml=b.moods.map(k=>MOODS.find(m=>m.key===k)?.label||k).join(', ')||'미정';
  const cl=b.colors.map(k=>CDIRS.find(c=>c.key===k)?.label||k).join(', ')||'미정';
  const tm={banner:'배너',keyvisual:'Key Visual',detail:'상세페이지'};
  return `📋 디자인 브리프\n━━━━━━━━━━━━━━━━━━━━━━\n캠페인명: ${b.campaignName||'(미입력)'}\n산출물: ${tm[b.outputType]||b.outputType}\n타겟: ${b.target||'(미입력)'}\n마감일: ${b.deadline||'(미입력)'}\n담당: ${b.assignees.join(', ')||'미정'}\n\n━━━━━━━━━━━━━━━━━━━━━━\n🎨 디자인 방향\n키워드: ${b.keywords.join(', ')||'(미입력)'}\n무드: ${ml}\n컬러: ${cl}\n톤앤매너: ${b.tones.join(', ')||'미정'}\n\n━━━━━━━━━━━━━━━━━━━━━━\n📝 요청사항\n${b.request||'(없음)'}\n━━━━━━━━━━━━━━━━━━━━━━`;
}

function rDesign(){

  const bar=`<div class="step-bar">${steps.map((s,i)=>`<div class="step-btn${DS===i+1?' on':''}" onclick="DS=${i+1};render()">${s}</div>`).join('')}</div>`;
  if(DS===1)return bar+rDS1();if(DS===2)return bar+rDS2();return bar+rDS3();
}

  {kw:['배너','banner','이미지','image','visual'],area:'배너/비주얼',risk:'medium',desc:'배너 노출 조건, 이미지 URL 경로 확인 필요'},
  {kw:['메뉴','menu','gnb','lnb','nav'],area:'GNB/LNB 메뉴',risk:'high',desc:'전체 페이지 내비게이션 구조 영향'},
  {kw:['회원','member','user','등급','포인트'],area:'마이페이지/회원',risk:'medium',desc:'회원 등급 표시, 포인트 UI 영향'},
  {kw:['주문','order','장바구니','cart','결제','payment'],area:'주문/결제 플로우',risk:'high',desc:'결제 프로세스 전체 영향 — QA 필수'},
  {kw:['팝업','popup','modal','레이어'],area:'팝업/모달',risk:'medium',desc:'노출 조건, z-index, 이벤트 트리거 확인'},
  {kw:['검색','search','필터','filter','sort'],area:'검색/필터 UI',risk:'medium',desc:'검색 결과, 필터 옵션 변경 영향'},
  {kw:['footer','헤더','header','공통'],area:'공통 영역',risk:'high',desc:'전 페이지 공통 — 모든 페이지 영향'},
  {kw:['api','endpoint','url','파라미터'],area:'API 연동',risk:'high',desc:'API 변경 시 프론트 전면 점검 필요'},
  {kw:['텍스트','text','문구','copy','라벨'],area:'UI 텍스트',risk:'low',desc:'정적 문구 변경은 영향 낮음'},
  {kw:['이벤트','event','기획전','campaign'],area:'이벤트/기획전',risk:'medium',desc:'노출 조건, 시작/종료 로직 확인'},
  {kw:['재고','stock','품절','soldout'],area:'재고/품절 표시',risk:'medium',desc:'PLP/PDP 재고 UI, 장바구니 버튼 상태 영향'},
];
function rImpact(){
  const hist=S.impactHistory.slice().reverse().slice(0,5).map(h=>`<div style="background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;margin-bottom:8px;font-size:12px">
    <div style="color:var(--gold);font-weight:600;margin-bottom:3px">${h.date}</div>
    <div style="color:#888;margin-bottom:5px">${esc(h.input)}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">${(h.hits||[]).map(x=>`<span class="tagr" style="background:${x.risk==='high'?'#f164640e':x.risk==='medium'?'#f59e0b0e':'#3ecf8e0e'};color:${x.risk==='high'?'#f16464':x.risk==='medium'?'#f59e0b':'#3ecf8e'}">${x.area}</span>`).join('')}</div>
  </div>`).join('');
  const res=IR.length?IR.map(r=>`<div class="ir" style="background:${r.risk==='high'?'#f164640e':r.risk==='medium'?'#f59e0b0e':'#3ecf8e0e'};border:1px solid ${r.risk==='high'?'#f164641e':r.risk==='medium'?'#f59e0b1e':'#3ecf8e1e'}">
    <div style="font-size:13px;font-weight:700;color:${r.risk==='high'?'#f16464':r.risk==='medium'?'#f59e0b':'#3ecf8e'};margin-bottom:6px">${r.risk==='high'?'🔴 높은':r.risk==='medium'?'🟡 중간':'🟢 낮은'} 영향 · ${r.area}</div>
    <div style="font-size:12px;color:#888;line-height:1.5">${r.desc}</div>
    <div style="font-size:10px;color:#444460;margin-top:5px">감지 키워드: ${(r.matched||[]).join(', ')}</div>
  </div>`).join(''):(II?`<div class="hintbox">✅ 영향도가 감지되지 않았어요. 더 구체적으로 입력해주세요.</div>`:'');
  return `<div class="card" style="margin-bottom:16px">
    <div class="sl" style="color:var(--blue);margin-bottom:10px">🔍 Admin 수정 → Front 영향도 분석</div>
    <div class="infobox">Admin에서 수정할 내용을 입력하면 프론트 영향 항목을 자동으로 분석해드려요.</div>
    <label class="fl">수정 내용 입력</label>
    <textarea class="fi" id="impTxt" rows="4" placeholder="예: 상품 카테고리 분류 기준 변경, 가격 정책 업데이트...">${esc(II)}</textarea>
    <button onclick="runImpact()" class="btn gold" style="width:100%">영향도 분석하기</button>
  </div>
  ${res?`<div style="margin-bottom:16px"><div class="sl" style="color:var(--red);margin-bottom:8px">분석 결과</div>${res}</div>`:''}
  ${S.impactHistory.length?`<div><div class="sl" style="color:#333350;margin-bottom:8px">최근 분석 이력</div>${hist}</div>`:''}`;
}
function runImpact(){
  const el=document.getElementById('impTxt');if(!el)return;
  II=el.value.trim();if(!II)return;
  const low=II.toLowerCase();
  IR=IRULES.filter(r=>r.kw.some(k=>low.includes(k))).map(r=>({...r,matched:r.kw.filter(k=>low.includes(k))})).sort((a,b)=>({high:0,medium:1,low:2}[a.risk]-{high:0,medium:1,low:2}[b.risk]));
  S.impactHistory.push({date:new Date().toLocaleDateString('ko-KR'),input:II,hits:IR});
  if(S.impactHistory.length>20)S.impactHistory=S.impactHistory.slice(-20);
  save();render();
}

// ─── LEARN ────────────────────────────────────────────────────
function rLearn(){
  const est=compEst();
  const done=S.tasks.filter(t=>t.status==='Done'&&t.startDate&&t.endDate);
  const aT=done.filter(t=>t.type==='Task'), aS=done.filter(t=>t.type==='Sub-task');
  const avgT=aT.length?(aT.reduce((s,t)=>s+diffD(t.startDate,t.endDate),0)/aT.length).toFixed(1):'-';
  const avgS=aS.length?(aS.reduce((s,t)=>s+diffD(t.startDate,t.endDate),0)/aS.length).toFixed(1):'-';
  const tc=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">
    ${ROLES.map(r=>`<div style="background:var(--sf);border:1px solid ${RC[r]}20;border-radius:10px;padding:12px 14px">
      <div style="font-size:10px;font-weight:700;color:${RC[r]};letter-spacing:1px;margin-bottom:8px">${r}팀</div>
      ${MEMBERS[r].map(m=>`<div style="font-size:12px;color:#aaa;padding:3px 0;display:flex;align-items:center;gap:5px"><span style="width:5px;height:5px;border-radius:99px;background:${RC[r]};display:inline-block"></span>${esc(m)}${m===ME?'<span style="font-size:9px;color:var(--gold);margin-left:3px">(나)</span>':m===TEAM?'<span style="font-size:9px;color:#e96d9b;margin-left:3px">(책임님)</span>':''}</div>`).join('')}
    </div>`).join('')}
  </div>`;
  let rows='';
  ROLES.forEach(role=>MEMBERS[role].forEach(m=>TYPES.forEach(type=>{
    const d=est[m]?.[type];
    if(d) rows+=`<tr>
      <td style="padding:8px 10px"><span class="tagr" style="background:${RC[role]}18;color:${RC[role]};margin-right:5px">${role}</span>${esc(m)}${m===ME?'<span style="font-size:9px;color:var(--gold);margin-left:4px">(나)</span>':m===TEAM?'<span style="font-size:9px;color:#e96d9b;margin-left:4px">(책임님)</span>':''}</td>
      <td style="padding:8px 10px"><span class="tag" style="background:${TC[type]}18;color:${TC[type]}">${type}</span></td>
      <td style="padding:8px 10px"><span style="color:var(--gold);font-weight:700">${d.avg}일</span></td>
      <td style="padding:8px 10px;color:var(--blue);font-size:11px">${d.count}건</td>
      <td style="padding:8px 10px;color:#444460;font-size:11px">${d.samples.join(', ')}일</td>
    </tr>`;
  })));
  return `<div class="stats-row">
    <div class="stat-box"><h5>총 완료</h5><div class="sv">${done.length}</div><div style="font-size:10px;color:#444460">학습 데이터</div></div>
    <div class="stat-box"><h5>Task 평균</h5><div class="sv">${avgT}</div><div style="font-size:10px;color:#444460">일</div></div>
    <div class="stat-box"><h5>Sub-task 평균</h5><div class="sv">${avgS}</div><div style="font-size:10px;color:#444460">일</div></div>
    <div class="stat-box"><h5>이관 업무</h5><div class="sv" style="color:#e96d9b">${getTrans().length}</div><div style="font-size:10px;color:#444460">건</div></div>
  </div>
  <div class="sl" style="color:var(--gold);margin-bottom:10px">👥 팀 구성원</div>${tc}
  <div class="sl" style="color:var(--gold);margin-bottom:10px">담당자별 학습 현황</div>
  ${rows?`<div style="background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:20px"><table class="ltable"><thead><tr><th>담당자</th><th>유형</th><th>평균공수</th><th>샘플수</th><th>최근 소요일</th></tr></thead><tbody>${rows}</tbody></table></div>`
  :`<div class="empty"><div style="font-size:30px;margin-bottom:8px">📊</div><div style="font-size:14px;color:#666688">아직 학습 데이터가 없어요</div><div style="font-size:12px;color:#333350;margin-top:5px">업무 완료 처리 시 자동 학습돼요</div></div>`}
  <div style="background:#c8a84b08;border:1px solid #c8a84b18;border-radius:12px;padding:16px">
    <div class="sl" style="color:var(--gold);margin-bottom:8px">📌 학습 방법</div>
    <div style="font-size:12px;color:#888;line-height:1.9">1. 업무 등록 시 <strong style="color:#e4e4f0">작업자 + 팀별 시작일</strong> 입력<br>2. 완료 시 <strong style="color:#e4e4f0">상태 → Done</strong> 변경<br>3. 데이터 누적 시 담당자별 예상 공수 자동 정확화<br>4. 최근 3건에 60% 가중치 → 최신 속도 반영</div>
  </div>`;
}

// ═══════════════════════════ ACTIONS ═══════════════════════════
function setTS(role,field,val){if(!FD.teamSchedules)FD.teamSchedules={};if(!FD.teamSchedules[role])FD.teamSchedules[role]={};FD.teamSchedules[role][field]=val||'';render();}
function togW(name){if(!FD.workers)FD.workers=[];const i=FD.workers.indexOf(name);if(i>-1)FD.workers.splice(i,1);else FD.workers.push(name);if(!FD.teamSchedules)FD.teamSchedules={};render();}
function goV(v){if(v!=='add')EID=null;if(v==='add'&&!EID)resetF();V=v;render();}
function resetF(){FD={type:'Task',status:'To Do',assignee:ME,code:'',summary:'',memo:'',isDesign:false,workType:'',workers:[],teamSchedules:{}};EID=null;}
function cancelF(){EID=null;resetF();goV('today');}
function setType(t){syncF();FD.type=t;render();}
function syncF(){const m={fCode:'code',fSum:'summary',fSts:'status',fMemo:'memo'};Object.entries(m).forEach(([id,k])=>{const el=document.getElementById(id);if(el)FD[k]=el.value;});}
function submitF(){
  syncF();
  if(!FD.summary?.trim()){alert('제목을 입력해주세요');return;}
  const scheds=FD.teamSchedules||{};
  const allEnds=ROLES.map(r=>scheds[r]?.end).filter(Boolean).sort();
  const overallEnd=allEnds.slice(-1)[0]||'';
  const allStarts=ROLES.map(r=>scheds[r]?.start).filter(Boolean).sort();
  const overallStart=allStarts[0]||td();
  const hasDesign=MEMBERS['디자인'].some(m=>(FD.workers||[]).includes(m));
  const task={
    id:EID||Date.now().toString(),
    code:FD.code||'',type:FD.type||'Task',summary:FD.summary,
    assignee:FD.assignee||ME,status:FD.status||'To Do',
    startDate:overallStart,dueDate:overallEnd,
    endDate:FD.status==='Done'?(overallEnd||td()):'',
    memo:FD.memo||'',isDesign:hasDesign,
    workType:FD.workType||'',workers:FD.workers||[],
    teamSchedules:FD.teamSchedules||{},
    originalAssignee:FD.originalAssignee||null,
    transferDate:FD.transferDate||null,
    createdAt:EID?S.tasks.find(t=>t.id===EID)?.createdAt:td()
  };
  if(EID){const ex=S.tasks.find(t=>t.id===EID);if(ex?.endDate&&task.status==='Done')task.endDate=ex.endDate;S.tasks=S.tasks.map(t=>t.id===EID?task:t);}
  else S.tasks.push(task);
  save();EID=null;resetF();goV('today');
}
function editTask(id){const t=S.tasks.find(t=>t.id===id);if(!t)return;EID=id;FD={...t,workers:t.workers||[],teamSchedules:t.teamSchedules||{}};V='add';render();}
function delTask(id){if(!confirm('삭제할까요?'))return;S.tasks=S.tasks.filter(t=>t.id!==id);save();render();}
function setSts(id,status){
  S.tasks=S.tasks.map(t=>{
    if(t.id!==id)return t;
    const u={...t,status};
    if(status==='Done'&&!t.endDate)u.endDate=td();
    return u;
  });
  save();render();
}
function confirmTrans(id){S.tasks=S.tasks.map(t=>t.id===id?{...t,transferConfirmed:true}:t);save();render();}

// Design actions
function togKw(k){const i=DB.keywords.indexOf(k);if(i>-1)DB.keywords.splice(i,1);else DB.keywords.push(k);render();}
function applyKw(){const el=document.getElementById('kwI');if(!el)return;DB.keywords=el.value.split(/[,\s]+/).map(k=>k.trim()).filter(Boolean);const rec=getDRec(DB.keywords);if(rec){DB.moods=[rec.mood];DB.colors=[rec.color];}render();}
function togArr(field,val){const arr=DB[field];const i=arr.indexOf(val);if(i>-1)arr.splice(i,1);else arr.push(val);render();}
function syncB(){const m={bCamp:'campaignName',bTgt:'target',bReq:'request'};Object.entries(m).forEach(([id,k])=>{const el=document.getElementById(id);if(el)DB[k]=el.value;});}
function genBrief(){
  syncB();
  const text=genBriefTxt(DB);
  S.lastBrief=text;
  if(!S.designHistory)S.designHistory=[];
  const tm={banner:'배너',keyvisual:'Key Visual',detail:'상세페이지'};
  S.designHistory.push({date:new Date().toLocaleDateString('ko-KR'),campaignName:DB.campaignName,outputType:tm[DB.outputType]||DB.outputType,moods:DB.moods.map(k=>MOODS.find(m=>m.key===k)?.label||k).join(', '),colors:DB.colors.map(k=>CDIRS.find(c=>c.key===k)?.label||k).join(', '),text});
  if(S.designHistory.length>20)S.designHistory=S.designHistory.slice(-20);
  save();render();
}
function copyLastBrief(){
  if(!S.lastBrief)return;
  navigator.clipboard.writeText(S.lastBrief).then(()=>alert('클립보드에 복사됐어요!')).catch(()=>{try{const el=document.getElementById('briefOut');if(el){const r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');alert('복사됐어요!');}}catch(e){}});
}
function copyBriefH(i){if(!S.designHistory)return;const h=S.designHistory.slice().reverse()[i];if(!h)return;navigator.clipboard.writeText(h.text).then(()=>alert('복사됐어요!')).catch(()=>{});}

// Monthly reminder
function monthlyReminder(){
  const now=new Date(),t=td();
  const lwd=lastWD(now.getFullYear(),now.getMonth()+1);
  const days=Math.ceil((new Date(lwd+'T00:00:00')-new Date(t+'T00:00:00'))/864e5);
  if(days<0||days>4)return'';
  return`<div class="greenbox" style="margin-bottom:16px">
    <div style="font-weight:700;margin-bottom:8px">📅 이달 말일 정기 업무 (${fmt(lwd)}${days===0?' · 오늘!':` · ${days}일 후`})</div>
    ${MTH.map(t=>`<div style="padding:3px 0;opacity:.85">▸ ${t}</div>`).join('')}
  </div>`;
}

// ═══ RENDER ═══
function render(){
  const map={today:rToday,week:rWeek,deploy:rDeploy,board:rBoard,add:rForm,design:rDesign,impact:rImpact,learn:rLearn};
  document.getElementById('app').innerHTML=(map[V]||rToday)();
  document.getElementById('nav').innerHTML=VIEWS.map((v,i)=>`<button class="nb${V===v?' on':''}" onclick="goV('${v}')">${VLABEL[i]}</button>`).join('');
  const now=new Date();
  document.getElementById('hDate').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  const cnt=S.tasks.filter(t=>t.assignee===ME&&t.status!=='Done'&&t.dueDate===td()).length;
  const tr=getTrans().length;
  document.getElementById('hMeta').innerHTML=`오늘 마감 ${cnt}건${tr?` · ⚠ 이관 ${tr}건`:''}`;
}

load();render();
</script>
